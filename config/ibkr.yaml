# IBKR TWS / IB Gateway connection settings
# Paper trading port: 7497 (TWS) or 4002 (Gateway)
# Live trading port:  7496 (TWS) or 4001 (Gateway)
#
# To enable API access in TWS:
#   Edit → Global Configuration → API → Settings
#   Check "Enable ActiveX and Socket Clients"
#   Check "Allow connections from localhost only" (or set trusted IPs)
#   Uncheck "Read-Only API" if you need order submission (not used here)

host: "127.0.0.1"
port: 7497       # paper TWS port
client_id: 1

# ── Historical data fetch tuning ─────────────────────────────────────────────
fetch:
  # Days per request chunk. IBKR rejects 1-min requests > ~7 days with
  # Error 162.  5 D is a safe default.
  chunk_days: 5

  # Max retry attempts per chunk before halving chunk size.
  max_retries: 3

  # Exponential-backoff base (seconds). Backoff = min(max, base * 2^attempt) + jitter.
  base_backoff_sec: 5

  # Backoff ceiling.
  max_backoff_sec: 60

  # Seconds to wait for a single reqHistoricalData response before treating it
  # as timed-out and retrying. ib_insync passes this to its internal timeout.
  request_timeout_sec: 120

  # Mandatory pause between successful chunks to stay inside IBKR pacing
  # (60 requests / 10-min window). 2 s is safe at chunk_days=5.
  pacing_pause_sec: 2

  # If true and the output CSV already exists, load it and only fetch bars
  # older than its earliest timestamp. De-duplicate on merge.
  resume: true

  # false = include extended / overnight hours (recommended for futures).
  # true  = regular trading hours only.
  use_rth: false

# ── Per-symbol contract overrides ─────────────────────────────────────────────
# Leave lastTradeDateOrContractMonth blank to auto-resolve front month.
contracts:
  ES:
    exchange: "CME"
    currency: "USD"
    lastTradeDateOrContractMonth: ""  # "" = auto front-month

  NQ:
    exchange: "CME"
    currency: "USD"
    lastTradeDateOrContractMonth: ""

  MES:   # micro ES
    exchange: "CME"
    currency: "USD"
    lastTradeDateOrContractMonth: ""

  MNQ:   # micro NQ
    exchange: "CME"
    currency: "USD"
    lastTradeDateOrContractMonth: ""
