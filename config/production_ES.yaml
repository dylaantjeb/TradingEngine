# ============================================================================
# ES Production Configuration
# ============================================================================
# Single canonical source of truth for the production rules-first engine.
#
# Architecture:  Rules signal (EMA momentum) → ML veto → FundedGuard gate
#
# Rules signal is PRIMARY: it generates entries.
# XGBoost is SECONDARY: it can only veto entries, never create them.
# FundedGuard is the funded-account safety layer.
#
# DO NOT edit this file for research purposes.
# Use config/profiles/ES_profiles.yaml + evaluate-profiles for research.
# Only run-production and live-paper --profile reads this file.
# ============================================================================

symbol: ES

# ── Contract specifications ─────────────────────────────────────────────────
contract:
  tick_size:  0.25
  tick_value: 12.50
  multiplier: 50

# ── Session ─────────────────────────────────────────────────────────────────
# Early session only: US equity open window.
# Exits are allowed freely after session ends; only entries are blocked.
session:
  start_utc: "13:30"       # 13:30 UTC = 09:30 ET = NYSE open
  end_utc:   "16:00"       # 16:00 UTC = 12:00 ET = US morning session close
  flat_outside: true       # flatten any open position at session end

# ── Rules-based signal (PRIMARY) ────────────────────────────────────────────
# EMA momentum continuation signal.
#   LONG:   close > EMA(N) AND slope > 0 AND |slope|/ATR >= min_frac
#   SHORT:  close < EMA(N) AND slope < 0 AND |slope|/ATR >= min_frac
signal:
  ema_period:           20    # EMA lookback in bars (100min on 5m)
  slope_lookback_bars:   5    # bars used to measure EMA slope
  min_slope_atr_frac: 0.12   # minimum |slope|/ATR to qualify (slope quality gate)
  require_price_side:   true  # close must be on correct side of EMA

# ── Volatility filter ────────────────────────────────────────────────────────
volatility:
  atr_period:    14
  atr_min_ticks:  5   # no trade when market is too quiet
  atr_max_ticks: 150  # no trade in extreme volatility (slippage dominates)

# ── ML veto (SECONDARY) ─────────────────────────────────────────────────────
# XGBoost can only BLOCK entries, not generate them.
# Both conditions must be true to allow a rules signal through:
#   1. ML confidence >= min_confidence
#   2. ML direction agrees with rules direction
ml_veto:
  enabled:                 true
  min_confidence:          0.65  # veto if model is not sufficiently confident
  require_direction_match: true  # veto if model direction disagrees with rules

# ── Trade parameters ─────────────────────────────────────────────────────────
trade:
  atr_stop_multiplier:   2.0   # stop = 2 × ATR_pts (in price points)
  atr_target_multiplier: 3.0   # target = 3 × ATR_pts
  min_rr_ratio:          1.5   # minimum risk-reward before entry (target/stop)
  execution_delay_bars:    1   # 1-bar fill delay (signal bar close → next open)

# ── Throttles ────────────────────────────────────────────────────────────────
throttles:
  max_trades_per_day:      4   # hard cap — only best setups of the session
  cooldown_bars_after_exit: 1  # brief pause after any exit
  cooldown_bars_after_loss: 3  # longer pause after a loss
  min_holding_bars:         1  # allow quick exits if needed

# ── Cost model ───────────────────────────────────────────────────────────────
costs:
  commission_per_side_usd:  1.50
  slippage_ticks_per_side:  1.0   # conservative 1-tick slippage per side
  spread_ticks:             1.0

# ── Funded-account risk limits ───────────────────────────────────────────────
# These are enforced by FundedGuard at runtime, not just simulated.
risk:
  starting_equity_usd:      50000
  contracts:                    1   # default position size
  max_contracts:                2   # FundedGuard may reduce this under REDUCED_RISK

  # Daily limits (funded-account standard)
  daily_loss_hard_usd:        500   # HALT for the day
  daily_loss_soft_usd:        300   # transition to CAUTION state

  # Drawdown limits
  trailing_drawdown_usd:     2000   # trailing high-water drawdown limit
  max_drawdown_usd:          3000   # absolute max drawdown → HALT

  # Consecutive loss limits
  max_consecutive_losses:       3   # 3 losses in a row → HALT
