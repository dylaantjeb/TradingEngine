# Trading universe configuration.
# The backtest command iterates over all symbols listed here.

symbols:
  - ES

# ── Execution hardening ────────────────────────────────────────────────────────
execution:
  execution_delay_bars: 1       # 0 = same-bar (leaky, debug only); 1 = next-bar fill

# ── Cost model ─────────────────────────────────────────────────────────────────
cost_model:
  commission_per_side_usd: 1.50
  slippage_ticks_per_side: 0.5
  spread_ticks: 1.0

# ── Filters ────────────────────────────────────────────────────────────────────
filters:
  # NY regular session: 14:30-21:00 UTC = 09:30-16:00 ET (winter)
  session_start_utc_hour: 14
  session_end_utc_hour: 21
  atr_min_ticks: 4
  atr_max_ticks: 150
  news_blackout_windows: []

# ── Signal confidence gating ────────────────────────────────────────────────────
# Only act when model confidence meets the minimum threshold.
# Higher values -> fewer but higher-quality trades -> lower drawdown.
confidence:
  min_long_confidence: 0.60
  min_short_confidence: 0.60

# ── Structural trend filter ─────────────────────────────────────────────────────
# Long signals blocked when close < EMA(ema_period).
# Short signals blocked when close > EMA(ema_period).
trend_filter:
  enabled: true
  ema_period: 200

# ── Prop-firm style risk limits ─────────────────────────────────────────────────
# Daily halt: triggered by daily loss limit OR max_consecutive_losses.
#   No new positions for the rest of that calendar day.
# Kill switch: triggered by total drawdown limit.
#   No new positions until manually reset.
risk_limits:
  starting_equity: 100000.0
  max_daily_loss_usd: 1000.0
  max_daily_loss_pct: 0.02
  max_total_drawdown_usd: 3000.0
  max_total_drawdown_pct: 0.06
  max_consecutive_losses: 3
  cooldown_bars_after_loss: 10

# ── Trade frequency throttles ──────────────────────────────────────────────────
throttles:
  max_trades_per_day: 6
  min_holding_bars: 5
  cooldown_bars_after_exit: 5
  max_concurrent_positions: 1

# ── Position sizing ─────────────────────────────────────────────────────────────
# method: fixed | fixed_dollar_risk | fixed_pct_risk
position_sizing:
  method: fixed
  fixed_contracts: 1
  risk_per_trade_usd: 500.0
  risk_per_trade_pct: 0.01
  atr_stop_multiplier: 1.5
  max_contracts: 3

# ── Contract specs ─────────────────────────────────────────────────────────────
contract_specs:
  ES:
    multiplier: 50
    tick_size: 0.25
    tick_value: 12.50
  NQ:
    multiplier: 20
    tick_size: 0.25
    tick_value: 5.00
  MES:
    multiplier: 5
    tick_size: 0.25
    tick_value: 1.25
  MNQ:
    multiplier: 2
    tick_size: 0.25
    tick_value: 0.50
