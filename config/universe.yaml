# Trading universe configuration.
# The backtest command iterates over all symbols listed here.
#
# Philosophy: fewer, higher-quality trades over many unstable ones.
# Every threshold below is biased towards funded-account safety.

symbols:
  - ES

# ── Execution hardening ────────────────────────────────────────────────────────
execution:
  execution_delay_bars: 1       # 0 = same-bar (leaky, debug only); 1 = next-bar fill

# ── Cost model ─────────────────────────────────────────────────────────────────
cost_model:
  commission_per_side_usd: 1.50
  slippage_ticks_per_side: 0.5
  spread_ticks: 1.0

# ── Filters ────────────────────────────────────────────────────────────────────
filters:
  # NY regular session: 14:30–21:00 UTC = 09:30–16:00 ET (winter)
  # Tightened: avoid the first 30 min (gap fills) and last 30 min (thin close)
  session_start_utc_hour: 15     # 10:00 ET — avoid chaotic open
  session_end_utc_hour: 20       # 15:00 ET — avoid thin close
  # ATR filter: only trade when volatility is meaningful but not runaway
  atr_min_ticks: 6               # raised from 4 — skip dead/flat conditions
  atr_max_ticks: 100             # lowered from 150 — skip news spikes
  news_blackout_windows: []

# ── Signal confidence gating ────────────────────────────────────────────────────
# Raised from 0.60 → 0.68: forces model to only act on its strongest signals.
# This is the single most effective lever for reducing overtrading and
# improving OOS performance.  Higher = fewer trades = lower drawdown.
confidence:
  min_long_confidence: 0.68
  min_short_confidence: 0.68

# ── Structural trend filter ─────────────────────────────────────────────────────
# Long signals blocked when close < EMA(ema_period).
# Short signals blocked when close > EMA(ema_period).
trend_filter:
  enabled: true
  ema_period: 200

# ── Prop-firm style risk limits ─────────────────────────────────────────────────
# Conservative limits matching typical 10% max-drawdown funded-account rules,
# with tighter daily limits to preserve capital during drawdown periods.
risk_limits:
  starting_equity: 100000.0
  max_daily_loss_usd: 800.0      # lowered from 1000 — cut day early
  max_daily_loss_pct: 0.015      # lowered from 0.02
  max_total_drawdown_usd: 2500.0 # lowered from 3000 — protect capital
  max_total_drawdown_pct: 0.05   # lowered from 0.06
  max_consecutive_losses: 3      # unchanged — 3 strikes and rest
  cooldown_bars_after_loss: 20   # doubled from 10 — cool down longer

# ── Trade frequency throttles ──────────────────────────────────────────────────
# Conservative: prefer sitting out over forcing trades.
throttles:
  max_trades_per_day: 4          # lowered from 6 — quality over quantity
  min_holding_bars: 8            # raised from 5 — avoid premature exits
  cooldown_bars_after_exit: 10   # doubled from 5 — let market settle
  max_concurrent_positions: 1

# ── Position sizing ─────────────────────────────────────────────────────────────
# Fixed 1 contract. Do not change to risk-based until strategy is FUNDED-READY.
position_sizing:
  method: fixed
  fixed_contracts: 1
  risk_per_trade_usd: 500.0
  risk_per_trade_pct: 0.01
  atr_stop_multiplier: 1.5
  max_contracts: 1               # hard cap at 1 — no pyramiding during validation

# ── Contract specs ─────────────────────────────────────────────────────────────
contract_specs:
  ES:
    multiplier: 50
    tick_size: 0.25
    tick_value: 12.50
  NQ:
    multiplier: 20
    tick_size: 0.25
    tick_value: 5.00
  MES:
    multiplier: 5
    tick_size: 0.25
    tick_value: 1.25
  MNQ:
    multiplier: 2
    tick_size: 0.25
    tick_value: 0.50
