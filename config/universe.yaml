# Trading universe configuration.
# The backtest command iterates over all symbols listed here.
#
# Philosophy: fewer, higher-quality trades over many unstable ones.
# Every threshold below is biased towards funded-account safety.

symbols:
  - ES

# ── Execution hardening ────────────────────────────────────────────────────────
execution:
  execution_delay_bars: 1       # 0 = same-bar (leaky, debug only); 1 = next-bar fill

# ── Cost model ─────────────────────────────────────────────────────────────────
cost_model:
  commission_per_side_usd: 1.50
  slippage_ticks_per_side: 0.5
  spread_ticks: 1.0

# ── Filters ────────────────────────────────────────────────────────────────────
filters:
  # ES CME Globex regular session: 09:30–16:15 ET
  #   Winter (ET = UTC-5): 14:30–21:15 UTC
  #   Summer (ET = UTC-4): 13:30–20:15 UTC
  # Using 14:00–21:00 UTC captures the full regular session year-round
  # while staying safely within liquid market hours.
  # Previous 15:00–20:00 window gave only 5 hours/day (300 M1 bars) —
  # the narrowest common source of near-zero execution.
  session_start_utc_hour: 14    # ≈ 09:00 ET winter / 10:00 ET summer
  session_end_utc_hour:   21    # ≈ 16:00 ET winter / 17:00 ET summer
  # ATR filter: only trade when volatility is meaningful but not runaway
  atr_min_ticks: 4              # restored from 6 — 6 was filtering too aggressively
  atr_max_ticks: 150            # raised from 100 — allow moderately elevated vola
  news_blackout_windows: []

# ── Signal confidence gating ────────────────────────────────────────────────────
# The schema threshold (saved by train.py) overrides these at runtime.
# These values serve only as a last-resort fallback when no schema is loaded.
confidence:
  min_long_confidence: 0.60
  min_short_confidence: 0.60

# ── Structural trend filter ─────────────────────────────────────────────────────
# Long signals blocked when close < EMA(ema_period).
# Short signals blocked when close > EMA(ema_period).
trend_filter:
  enabled: true
  ema_period: 200

# ── Prop-firm style risk limits ─────────────────────────────────────────────────
# Conservative limits matching typical 10% max-drawdown funded-account rules.
risk_limits:
  starting_equity: 100000.0
  max_daily_loss_usd: 1000.0     # raised from 800 — less hair-trigger daily halt
  max_daily_loss_pct: 0.02       # raised from 0.015
  max_total_drawdown_usd: 3000.0 # raised from 2500
  max_total_drawdown_pct: 0.06   # raised from 0.05
  max_consecutive_losses: 4      # raised from 3 — 3 was halting too easily
  cooldown_bars_after_loss: 5    # reduced from 20 — 20 M1 bars = 20 min dead time

# ── Trade frequency throttles ──────────────────────────────────────────────────
# Previous values caused extreme suppression:
#   min_holding=8 + cooldown_exit=10 + cooldown_loss=20 = 38-bar dead-zone/cycle.
# With 300 session bars/day and 38-bar cycles, only ~8 trades/day are physically
# possible — then max_trades_per_day=4 caps it further.
# New values reduce the dead-zone to ~11 bars, allowing ~38 trades/day (before cap).
throttles:
  max_trades_per_day: 6          # raised from 4
  min_holding_bars: 3            # reduced from 8 — 8 min was blocking reversal signals
  cooldown_bars_after_exit: 3    # reduced from 10 — 10 min dead time was too long
  max_concurrent_positions: 1

# ── Position sizing ─────────────────────────────────────────────────────────────
# Fixed 1 contract. Do not change to risk-based until strategy is FUNDED-READY.
position_sizing:
  method: fixed
  fixed_contracts: 1
  risk_per_trade_usd: 500.0
  risk_per_trade_pct: 0.01
  atr_stop_multiplier: 1.5
  max_contracts: 1               # hard cap at 1 — no pyramiding during validation

# ── Contract specs ─────────────────────────────────────────────────────────────
contract_specs:
  ES:
    multiplier: 50
    tick_size: 0.25
    tick_value: 12.50
  NQ:
    multiplier: 20
    tick_size: 0.25
    tick_value: 5.00
  MES:
    multiplier: 5
    tick_size: 0.25
    tick_value: 1.25
  MNQ:
    multiplier: 2
    tick_size: 0.25
    tick_value: 0.50
