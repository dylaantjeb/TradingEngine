# Trading universe configuration.
# ================================
# Single symbol. Single session window. Funded-account defaults.
#
# Philosophy: survival first. Every default below is biased towards
# funded-account safety, not maximum PnL.

symbols:
  - ES

# ── Execution ─────────────────────────────────────────────────────────────────
execution:
  execution_delay_bars: 1   # always 1 — next-bar fills only

# ── Cost model ────────────────────────────────────────────────────────────────
cost_model:
  commission_per_side_usd: 1.50
  slippage_ticks_per_side: 1.0   # conservative: 1 tick per side for ES M1
  spread_ticks: 1.0

# ── Session ───────────────────────────────────────────────────────────────────
# US equity open window only. Block 2 (afternoon) removed — consistently
# underperforms and adds noise. Entries blocked outside this window.
filters:
  session_blocks:
    - [13.5, 16.0]   # 13:30-16:00 UTC = NYSE open
  session_start_utc_hour: 13.5   # fallback for legacy single-window path
  session_end_utc_hour:   16.0
  atr_min_ticks: 8     # require real movement at entry
  atr_max_ticks: 100   # cap extreme volatility
  news_blackout_windows: []

# ── Signal confidence gate ────────────────────────────────────────────────────
# ML veto only. Schema threshold (set during training) overrides these.
confidence:
  min_long_confidence: 0.60
  min_short_confidence: 0.60

# ── Trend filter ──────────────────────────────────────────────────────────────
# EMA100(M1) ≈ EMA20(M5). Slope gate ensures real trend, not drift.
trend_filter:
  enabled: true
  ema_period: 100
  min_slope_atr_frac: 0.15

# ── Funded-account risk limits ────────────────────────────────────────────────
# Calibrated for a $50k funded account with 1% daily loss limit.
risk_limits:
  starting_equity: 50000.0
  max_daily_loss_usd: 500.0      # 1% of $50k — hard funded-account limit
  max_daily_loss_pct: 0.01
  max_total_drawdown_usd: 2000.0 # 4% of $50k
  max_total_drawdown_pct: 0.04
  max_consecutive_losses: 2      # stop after 2 losses — no revenge trading
  cooldown_bars_after_loss: 20   # 20-min hard pause after any loss

# ── Trade frequency throttles ─────────────────────────────────────────────────
# 2 trades/day maximum. This is not a frequency game.
throttles:
  max_trades_per_day: 2
  min_holding_bars: 3
  cooldown_bars_after_exit: 5
  max_concurrent_positions: 1

# ── Position sizing ───────────────────────────────────────────────────────────
position_sizing:
  method: fixed
  fixed_contracts: 1
  risk_per_trade_usd: 250.0     # 0.5% of $50k per trade
  risk_per_trade_pct: 0.005
  atr_stop_multiplier: 2.0      # stop = 2×ATR
  atr_target_multiplier: 2.2    # target = 2.2×ATR (R:R = 1.1 — boring but real)
  max_contracts: 1              # no pyramiding during validation

# ── Contract specs ────────────────────────────────────────────────────────────
contract_specs:
  ES:
    multiplier: 50
    tick_size: 0.25
    tick_value: 12.50
  MES:
    multiplier: 5
    tick_size: 0.25
    tick_value: 1.25
