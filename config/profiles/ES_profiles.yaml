# ES Execution Profiles
# =====================
# Single production profile. All research profiles removed.
#
# Design philosophy:
#   - One profile, known and understood
#   - 0-2 trades per day maximum
#   - US open session only (directional, liquid)
#   - Rules generate signals; ML only vetoes
#   - Survival first, profit second
#
# To evaluate:
#   python -m src.cli evaluate-profiles --symbol ES --trials 30 --seed 42

profiles:

  es_pullback_scalper:
    description: >
      Trend pullback scalper. M1 execution with M5 trend context via EMA100(M1).
      Session restricted to US equity open (13:30-16:00 UTC) — the only window
      where ES has reliable directional bias, volume, and follow-through.
      Max 2 trades per day. Hard stop after 2 daily losses.
      ATR floor 8 ticks ensures meaningful volatility at entry.
      Cooldown 20 bars after loss = 20-minute pause, letting regime reset.
      ML is a confidence veto only (threshold 0.60-0.65); it cannot generate entries.
    threshold_candidates: [0.60, 0.65]
    session_blocks:
      - [13.5, 16.0]   # 13:30-16:00 UTC = NYSE open window
    atr_min_ticks: 8    # require real movement (2 ES points = meaningful ATR)
    atr_max_ticks: 100  # cap at ~25 ES points ATR — beyond this, slippage dominates
    trend_filter_enabled: true
    trend_filter_ema_period: 100   # M1 EMA100 ≈ M5 EMA20 — medium-term directional bias
    trend_slope_min_atr_frac: 0.15 # slope must be 15% of ATR — real trend, not drift
    cooldown_bars_after_exit: 5    # 5-min pause after any exit
    cooldown_bars_after_loss: 20   # 20-min mandatory pause after a loss
    max_trades_per_day: 2          # discipline: best 2 setups only
    min_holding_bars: 3            # no 1-2 bar flips
